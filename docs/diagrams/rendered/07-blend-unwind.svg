<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1180" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      .h-title { font: 700 22px Inter, system-ui, sans-serif; fill: #0F172A; }
      .h-sub   { font: 500 13px Inter, system-ui, sans-serif; fill: #64748B; }
      .lbl     { font: 600 14px Inter, system-ui, sans-serif; fill: #0F172A; }
      .lbl-sm  { font: 500 12px Inter, system-ui, sans-serif; fill: #475569; }
      .lbl-xs  { font: 500 11px Inter, system-ui, sans-serif; fill: #64748B; }
      .indigo-text { fill: #4338CA; }
      .danger-text { fill: #B91C1C; }
      .warn-text { fill: #B45309; }
      .ok-text { fill: #047857; }
      .slate-text { fill: #334155; }
      .op { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#475569"/></marker>
    <marker id="arr-ok" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/></marker>
    <marker id="arr-warn" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/></marker>
    <marker id="arr-danger" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/></marker>
    <marker id="arr-indigo" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4F46E5"/></marker>
  </defs>

  <rect width="1300" height="1180" fill="#FFFFFF"/>

  <text x="64" y="56" class="h-title">Blend unwind — repay first, withdraw last, respect the queue</text>
  <text x="64" y="80" class="h-sub">Repay any open debt before touching supplied collateral. Backstop deposits are subject to a 17-day Q4W withdrawal queue.</text>

  <!-- detect -->
  <g>
    <rect x="540" y="120" width="240" height="70" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
    <text x="660" y="148" text-anchor="middle" class="lbl slate-text">Detect Blend position</text>
    <text x="660" y="170" text-anchor="middle" class="lbl-xs">OctoPos / Orion</text>
  </g>

  <!-- ver -->
  <g>
    <rect x="540" y="220" width="240" height="70" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="660" y="248" text-anchor="middle" class="lbl indigo-text">Resolve pool version</text>
    <text x="660" y="270" text-anchor="middle" class="lbl-xs">by wasmHash → V1 or V2</text>
  </g>

  <!-- hasdebt diamond -->
  <g>
    <polygon points="660,310 800,380 660,450 520,380" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.8"/>
    <text x="660" y="376" text-anchor="middle" class="lbl indigo-text">Open dToken debt?</text>
    <text x="660" y="396" text-anchor="middle" class="lbl-xs">(borrowed against this pool)</text>
  </g>

  <!-- acquire (left branch, yes) -->
  <g>
    <rect x="160" y="490" width="280" height="80" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.6"/>
    <text x="300" y="518" text-anchor="middle" class="lbl indigo-text">Acquire repayment asset</text>
    <text x="300" y="538" text-anchor="middle" class="lbl-xs">if account doesn't already hold it</text>
    <text x="300" y="554" text-anchor="middle" class="lbl-xs">route + PathPayment / swap</text>
  </g>

  <!-- repay -->
  <g>
    <rect x="160" y="600" width="280" height="70" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.8"/>
    <text x="300" y="628" text-anchor="middle" class="lbl indigo-text">Repay</text>
    <text x="300" y="650" text-anchor="middle" class="lbl-xs op" fill="#4338CA">submit(RequestType = 5)</text>
  </g>

  <!-- hf diamond -->
  <g>
    <polygon points="300,700 460,770 300,840 140,770" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.8"/>
    <text x="300" y="765" text-anchor="middle" class="lbl indigo-text">Health factor</text>
    <text x="300" y="783" text-anchor="middle" class="lbl-sm indigo-text">≥ 1.0 after repay?</text>
  </g>

  <!-- block (terminal, far left) -->
  <g>
    <rect x="20" y="730" width="100" height="80" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.8"/>
    <text x="70" y="763" text-anchor="middle" class="lbl danger-text">Block</text>
    <text x="70" y="782" text-anchor="middle" class="lbl-xs danger-text">explain risk</text>
    <text x="70" y="798" text-anchor="middle" class="lbl-xs danger-text">do not withdraw</text>
  </g>

  <!-- withdraw (center, merging point from both branches) -->
  <g>
    <rect x="520" y="900" width="280" height="80" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.6"/>
    <text x="660" y="928" text-anchor="middle" class="lbl indigo-text">Withdraw / WithdrawCollateral</text>
    <text x="660" y="948" text-anchor="middle" class="lbl-xs op" fill="#4338CA">submit(RequestType = 1 / 3)</text>
    <text x="660" y="964" text-anchor="middle" class="lbl-xs">drain supply position</text>
  </g>

  <!-- backstop diamond -->
  <g>
    <polygon points="660,1010 820,1075 660,1140 500,1075" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.8"/>
    <text x="660" y="1072" text-anchor="middle" class="lbl indigo-text">Backstop</text>
    <text x="660" y="1090" text-anchor="middle" class="lbl-sm indigo-text">deposit?</text>
  </g>

  <!-- Position closed (terminal, success, left of backstop) -->
  <g>
    <rect x="900" y="900" width="260" height="80" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.8"/>
    <text x="1030" y="928" text-anchor="middle" class="lbl ok-text">Position closed</text>
    <text x="1030" y="948" text-anchor="middle" class="lbl-xs">no backstop deposit</text>
    <text x="1030" y="964" text-anchor="middle" class="lbl-xs">proceed to next protocol</text>
  </g>

  <!-- wait (queued) -->
  <g>
    <rect x="900" y="1035" width="260" height="105" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.8"/>
    <text x="1030" y="1062" text-anchor="middle" class="lbl warn-text">Show 17-day queue</text>
    <text x="1030" y="1084" text-anchor="middle" class="lbl-xs">proceed with rest of plan;</text>
    <text x="1030" y="1100" text-anchor="middle" class="lbl-xs">warn funds locked until</text>
    <text x="1030" y="1116" text-anchor="middle" class="lbl-xs">queue matures</text>
  </g>

  <!-- ============ ARROWS ============ -->
  <line x1="660" y1="190" x2="660" y2="218" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="660" y1="290" x2="660" y2="308" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- hasdebt → acquire (yes, left) -->
  <path d="M 520 380 C 400 380, 320 450, 300 488" fill="none" stroke="#4F46E5" stroke-width="1.8" marker-end="url(#arr-indigo)"/>
  <text x="390" y="430" class="lbl-xs indigo-text" font-weight="700">yes</text>

  <!-- hasdebt → withdraw (no, down through center, right side) -->
  <path d="M 800 380 C 900 380, 900 880, 760 898" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="848" y="540" class="lbl-xs" font-weight="700">no</text>

  <!-- acquire → repay -->
  <line x1="300" y1="570" x2="300" y2="598" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#arr-indigo)"/>

  <!-- repay → hf -->
  <line x1="300" y1="670" x2="300" y2="698" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#arr-indigo)"/>

  <!-- hf yes → withdraw (down-right curve) -->
  <path d="M 460 770 C 540 770, 580 880, 580 898" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#arr-ok)"/>
  <text x="500" y="830" class="lbl-xs ok-text" font-weight="700">yes</text>

  <!-- hf no → block (left) -->
  <line x1="138" y1="770" x2="122" y2="770" stroke="#DC2626" stroke-width="1.8" marker-end="url(#arr-danger)"/>
  <text x="130" y="755" text-anchor="middle" class="lbl-xs danger-text" font-weight="700">no</text>

  <!-- withdraw → backstop -->
  <line x1="660" y1="980" x2="660" y2="1008" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#arr-indigo)"/>

  <!-- backstop none → Position closed (right, up-right) -->
  <path d="M 820 1075 C 870 1075, 900 970, 898 940" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#arr-ok)"/>
  <text x="840" y="1020" class="lbl-xs ok-text" font-weight="700">none</text>

  <!-- backstop queued → wait (right) -->
  <path d="M 820 1075 C 870 1075, 880 1080, 898 1080" fill="none" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#arr-warn)"/>
  <text x="836" y="1108" class="lbl-xs warn-text" font-weight="700">queued (Q4W)</text>

  <!-- Legend -->
  <g transform="translate(64,180)">
    <rect x="0" y="-10" width="14" height="14" rx="3" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="22" y="1" class="lbl-xs">client step / decision</text>
    <rect x="0" y="14" width="14" height="14" rx="3" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <text x="22" y="25" class="lbl-xs">success terminal</text>
    <rect x="0" y="38" width="14" height="14" rx="3" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="22" y="49" class="lbl-xs">caution / delayed</text>
    <rect x="0" y="62" width="14" height="14" rx="3" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="22" y="73" class="lbl-xs">blocked (unsafe)</text>
  </g>
</svg>
