<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1080" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      .h-title { font: 700 22px Inter, system-ui, sans-serif; fill: #0F172A; }
      .h-sub   { font: 500 13px Inter, system-ui, sans-serif; fill: #64748B; }
      .num     { font: 700 18px Inter, system-ui, sans-serif; fill: #FFFFFF; }
      .step    { font: 700 16px Inter, system-ui, sans-serif; fill: #0F172A; }
      .op      { font: 500 12px Inter, system-ui, sans-serif; fill: #4338CA; font-family: 'JetBrains Mono', monospace; }
      .desc    { font: 500 12px Inter, system-ui, sans-serif; fill: #475569; }
      .tag     { font: 600 10px Inter, system-ui, sans-serif; letter-spacing: 0.05em; }
    </style>
  </defs>

  <rect width="1100" height="1080" fill="#FFFFFF"/>

  <text x="64" y="56" class="h-title">Execution plan — the deterministic wind-down order</text>
  <text x="64" y="80" class="h-sub">Each step prepares the ledger for the next. The order is fixed by Stellar protocol constraints, not by preference.</text>

  <!-- Vertical timeline line -->
  <line x1="90" y1="170" x2="90" y2="970" stroke="#C7D2FE" stroke-width="3"/>

  <!-- STEP 1: Normalize signers -->
  <g>
    <circle cx="90" cy="170" r="22" fill="#4F46E5"/>
    <text x="90" y="176" text-anchor="middle" class="num">1</text>
    <rect x="140" y="138" width="900" height="74" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <text x="160" y="166" class="step">Normalize signers</text>
    <text x="160" y="190" class="op">SetOptions</text>
    <text x="270" y="190" class="desc">remove extra signers · master weight 0/1/1 thresholds</text>
    <rect x="940" y="148" width="84" height="20" rx="4" fill="#EEF2FF"/>
    <text x="982" y="162" text-anchor="middle" class="tag" fill="#4338CA">CLASSIC</text>
  </g>

  <!-- STEP 2: Remove data entries -->
  <g>
    <circle cx="90" cy="260" r="22" fill="#4F46E5"/>
    <text x="90" y="266" text-anchor="middle" class="num">2</text>
    <rect x="140" y="228" width="900" height="74" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <text x="160" y="256" class="step">Remove data entries</text>
    <text x="160" y="280" class="op">ManageData</text>
    <text x="270" y="280" class="desc">value = null · batched up to 100 ops per transaction</text>
    <rect x="940" y="238" width="84" height="20" rx="4" fill="#EEF2FF"/>
    <text x="982" y="252" text-anchor="middle" class="tag" fill="#4338CA">CLASSIC</text>
  </g>

  <!-- STEP 3: Claim claimable balances -->
  <g>
    <circle cx="90" cy="350" r="22" fill="#4F46E5"/>
    <text x="90" y="356" text-anchor="middle" class="num">3</text>
    <rect x="140" y="318" width="900" height="74" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <text x="160" y="346" class="step">Claim selected claimable balances</text>
    <text x="160" y="370" class="op">ClaimClaimableBalance</text>
    <text x="340" y="370" class="desc">optional · user picks which to claim</text>
    <rect x="940" y="328" width="84" height="20" rx="4" fill="#EEF2FF"/>
    <text x="982" y="342" text-anchor="middle" class="tag" fill="#4338CA">CLASSIC</text>
  </g>

  <!-- STEP 4: Cancel DEX offers -->
  <g>
    <circle cx="90" cy="440" r="22" fill="#4F46E5"/>
    <text x="90" y="446" text-anchor="middle" class="num">4</text>
    <rect x="140" y="408" width="900" height="74" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <text x="160" y="436" class="step">Cancel DEX offers</text>
    <text x="160" y="460" class="op">ManageSellOffer / ManageBuyOffer</text>
    <text x="410" y="460" class="desc">amount = 0 to cancel · frees offer subentries</text>
    <rect x="940" y="418" width="84" height="20" rx="4" fill="#EEF2FF"/>
    <text x="982" y="432" text-anchor="middle" class="tag" fill="#4338CA">CLASSIC</text>
  </g>

  <!-- STEP 5: Withdraw AMM/LP -->
  <g>
    <circle cx="90" cy="530" r="22" fill="#4F46E5"/>
    <text x="90" y="536" text-anchor="middle" class="num">5</text>
    <rect x="140" y="498" width="900" height="74" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <text x="160" y="526" class="step">Withdraw AMM and LP positions</text>
    <text x="160" y="550" class="op">LiquidityPoolWithdraw + Soroban pool withdrawals</text>
    <rect x="922" y="508" width="102" height="20" rx="4" fill="#FAE8FF"/>
    <text x="973" y="522" text-anchor="middle" class="tag" fill="#86198F">MIXED</text>
  </g>

  <!-- STEP 6: Exit DeFi -->
  <g>
    <circle cx="90" cy="620" r="22" fill="#4F46E5"/>
    <text x="90" y="626" text-anchor="middle" class="num">6</text>
    <rect x="140" y="588" width="900" height="74" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <text x="160" y="616" class="step">Exit DeFi protocols</text>
    <text x="160" y="640" class="op">Blend · Phoenix · FxDAO</text>
    <text x="346" y="640" class="desc">repay debt first, then withdraw supply</text>
    <rect x="922" y="598" width="102" height="20" rx="4" fill="#ECFEFF"/>
    <text x="973" y="612" text-anchor="middle" class="tag" fill="#0E7490">SOROBAN</text>
  </g>

  <!-- STEP 7: Convert assets -->
  <g>
    <circle cx="90" cy="710" r="22" fill="#4F46E5"/>
    <text x="90" y="716" text-anchor="middle" class="num">7</text>
    <rect x="140" y="678" width="900" height="74" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <text x="160" y="706" class="step">Convert all assets to XLM</text>
    <text x="160" y="730" class="op">PathPaymentStrictSend or Soroban swaps</text>
    <text x="430" y="730" class="desc">slippage-bounded · minimum received enforced</text>
    <rect x="922" y="688" width="102" height="20" rx="4" fill="#FAE8FF"/>
    <text x="973" y="702" text-anchor="middle" class="tag" fill="#86198F">MIXED</text>
  </g>

  <!-- STEP 8: Remove trustlines -->
  <g>
    <circle cx="90" cy="800" r="22" fill="#4F46E5"/>
    <text x="90" y="806" text-anchor="middle" class="num">8</text>
    <rect x="140" y="768" width="900" height="74" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <text x="160" y="796" class="step">Remove trustlines</text>
    <text x="160" y="820" class="op">ChangeTrust</text>
    <text x="270" y="820" class="desc">limit = 0 · batched up to 100 ops · only after balances are zero</text>
    <rect x="940" y="778" width="84" height="20" rx="4" fill="#EEF2FF"/>
    <text x="982" y="792" text-anchor="middle" class="tag" fill="#4338CA">CLASSIC</text>
  </g>

  <!-- STEP 9: Merge account -->
  <g>
    <circle cx="90" cy="890" r="26" fill="#4338CA" stroke="#FFFFFF" stroke-width="3"/>
    <text x="90" y="896" text-anchor="middle" class="num">9</text>
    <rect x="140" y="852" width="900" height="84" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
    <text x="160" y="882" class="step" fill="#4338CA">Merge account</text>
    <text x="160" y="908" class="op">AccountMerge</text>
    <text x="266" y="908" class="desc">direct to destination · or via temporary mediator if exchange requires a memo</text>
    <text x="160" y="924" class="desc" font-weight="700" fill="#4338CA">→ base reserve and all remaining XLM are released to the destination</text>
  </g>

  <!-- Footer constraints note -->
  <g transform="translate(140,1000)">
    <text x="0" y="0" class="step" fill="#0F172A">Why this order</text>
    <text x="0" y="22" class="desc">Stellar rejects an AccountMerge while subentries (offers, trustlines with balance, signers) remain. Each step removes a class of subentry,</text>
    <text x="0" y="38" class="desc">monotonically reducing the merge precondition until step 9 can finally succeed.</text>
  </g>
</svg>
