<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 920" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      .h-title { font: 700 22px Inter, system-ui, sans-serif; fill: #0F172A; }
      .h-sub   { font: 500 13px Inter, system-ui, sans-serif; fill: #64748B; }
      .layer-title { font: 700 13px Inter, system-ui, sans-serif; letter-spacing: 0.08em; }
      .lbl     { font: 600 14px Inter, system-ui, sans-serif; fill: #0F172A; }
      .lbl-sm  { font: 500 11px Inter, system-ui, sans-serif; fill: #475569; }
      .lbl-xs  { font: 500 10px Inter, system-ui, sans-serif; fill: #64748B; }
      .indigo-text { fill: #4338CA; }
      .stellar-text { fill: #0E7490; }
      .slate-text { fill: #334155; }
    </style>
    <marker id="arr-slate" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/></marker>
    <marker id="arr-indigo" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4F46E5"/></marker>
    <marker id="arr-stellar" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0891B2"/></marker>
  </defs>

  <rect width="1280" height="920" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="64" y="56" class="h-title">LumenWipe — System architecture</text>
  <text x="64" y="80" class="h-sub">Three layers, one trust boundary. Signed transactions go straight from the browser to Stellar RPC.</text>

  <!-- ================== LAYER 1: BROWSER CLIENT ================== -->
  <rect x="60" y="110" width="1160" height="240" rx="18"
        fill="#EEF2FF" stroke="#4F46E5" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="84" y="135" class="layer-title indigo-text">BROWSER CLIENT · TRUST BOUNDARY · KEYS NEVER LEAVE</text>
  <!-- Lock icon -->
  <g transform="translate(1170,118)">
    <rect x="0" y="6" width="16" height="12" rx="2" fill="#4F46E5"/>
    <path d="M2.5 6 v-3 a5.5 5.5 0 0 1 11 0 v3" fill="none" stroke="#4F46E5" stroke-width="2"/>
  </g>

  <!-- Row 1 -->
  <g>
    <rect x="100" y="155" width="220" height="80" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.6"/>
    <text x="210" y="183" text-anchor="middle" class="lbl indigo-text">Guided UI</text>
    <text x="210" y="203" text-anchor="middle" class="lbl-xs">plan · confirmations · dry-run preview</text>
  </g>
  <g>
    <rect x="380" y="155" width="220" height="80" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.6"/>
    <text x="490" y="183" text-anchor="middle" class="lbl indigo-text">Wallet adapter</text>
    <text x="490" y="203" text-anchor="middle" class="lbl-xs">stellar-wallets-kit</text>
  </g>
  <g>
    <rect x="660" y="155" width="220" height="80" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.6"/>
    <text x="770" y="183" text-anchor="middle" class="lbl indigo-text">Secret-key mode</text>
    <text x="770" y="203" text-anchor="middle" class="lbl-xs">in-memory only · never persisted</text>
  </g>
  <g>
    <rect x="940" y="155" width="240" height="80" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.6"/>
    <text x="1060" y="183" text-anchor="middle" class="lbl indigo-text">Session store</text>
    <text x="1060" y="203" text-anchor="middle" class="lbl-xs">IndexedDB · resume state · no keys</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="100" y="252" width="220" height="80" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.6"/>
    <text x="210" y="280" text-anchor="middle" class="lbl indigo-text">Transaction builder</text>
    <text x="210" y="300" text-anchor="middle" class="lbl-xs">pure TypeScript · deterministic XDR</text>
  </g>
  <g>
    <rect x="380" y="252" width="500" height="80" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="2.2"/>
    <text x="630" y="280" text-anchor="middle" class="lbl indigo-text">Signer + XDR review</text>
    <text x="630" y="300" text-anchor="middle" class="lbl-xs">explicit per-step review · user-signed envelopes · the only place keys are used</text>
  </g>
  <g>
    <rect x="940" y="252" width="240" height="80" rx="10" fill="none" stroke="none"/>
    <text x="1060" y="295" text-anchor="middle" class="lbl-xs" font-style="italic">no keys ever cross this boundary →</text>
  </g>

  <!-- Internal browser arrows -->
  <line x1="210" y1="235" x2="210" y2="250" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#arr-indigo)"/>
  <line x1="320" y1="292" x2="378" y2="292" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#arr-indigo)"/>
  <line x1="490" y1="235" x2="490" y2="250" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#arr-indigo)"/>
  <line x1="770" y1="235" x2="770" y2="250" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#arr-indigo)"/>

  <!-- ================== LAYER 2: READ-ONLY BACKEND ================== -->
  <rect x="60" y="400" width="1160" height="200" rx="18"
        fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.6"/>
  <text x="84" y="425" class="layer-title slate-text">READ-ONLY BACKEND · STATELESS · NO KEYS · NO CUSTODY</text>

  <g>
    <rect x="100" y="445" width="200" height="130" rx="10" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.4"/>
    <text x="200" y="473" text-anchor="middle" class="lbl slate-text">Account analysis</text>
    <text x="200" y="491" text-anchor="middle" class="lbl-xs">aggregator</text>
    <text x="200" y="525" text-anchor="middle" class="lbl-xs">combines indexer +</text>
    <text x="200" y="540" text-anchor="middle" class="lbl-xs">live RPC + DeFi adapter</text>
  </g>
  <g>
    <rect x="316" y="445" width="200" height="130" rx="10" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.4"/>
    <text x="416" y="473" text-anchor="middle" class="lbl slate-text">DeFi position</text>
    <text x="416" y="491" text-anchor="middle" class="lbl-xs">adapter</text>
    <text x="416" y="525" text-anchor="middle" class="lbl-xs">OctoPos primary</text>
    <text x="416" y="540" text-anchor="middle" class="lbl-xs">Orion fallback</text>
  </g>
  <g>
    <rect x="532" y="445" width="200" height="130" rx="10" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.4"/>
    <text x="632" y="473" text-anchor="middle" class="lbl slate-text">Routing service</text>
    <text x="632" y="525" text-anchor="middle" class="lbl-xs">Soroswap aggregator +</text>
    <text x="632" y="540" text-anchor="middle" class="lbl-xs">SDEX paths</text>
  </g>
  <g>
    <rect x="748" y="445" width="200" height="130" rx="10" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.4"/>
    <text x="848" y="473" text-anchor="middle" class="lbl slate-text">Mediator factory</text>
    <text x="848" y="525" text-anchor="middle" class="lbl-xs">builds unsigned XDR</text>
    <text x="848" y="540" text-anchor="middle" class="lbl-xs">for exchange flows</text>
  </g>
  <g>
    <rect x="964" y="445" width="100" height="130" rx="10" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.4"/>
    <text x="1014" y="473" text-anchor="middle" class="lbl slate-text">Registries</text>
    <text x="1014" y="525" text-anchor="middle" class="lbl-xs">exchanges</text>
    <text x="1014" y="540" text-anchor="middle" class="lbl-xs">+ contracts</text>
  </g>
  <g>
    <rect x="1080" y="445" width="100" height="130" rx="10" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.4"/>
    <text x="1130" y="473" text-anchor="middle" class="lbl slate-text">Cache</text>
    <text x="1130" y="525" text-anchor="middle" class="lbl-xs">Redis</text>
    <text x="1130" y="540" text-anchor="middle" class="lbl-xs">TTL bounded</text>
  </g>

  <!-- ================== LAYER 3: STELLAR NETWORK + DATA ================== -->
  <rect x="60" y="650" width="1160" height="240" rx="18"
        fill="#ECFEFF" stroke="#0891B2" stroke-width="1.8"/>
  <text x="84" y="675" class="layer-title stellar-text">STELLAR NETWORK + DATA SERVICES</text>

  <g>
    <rect x="100" y="700" width="200" height="90" rx="10" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.6"/>
    <text x="200" y="728" text-anchor="middle" class="lbl stellar-text">Stellar RPC</text>
    <text x="200" y="748" text-anchor="middle" class="lbl-xs">live reads · simulate</text>
    <text x="200" y="763" text-anchor="middle" class="lbl-xs">submit · events</text>
  </g>
  <g>
    <rect x="316" y="700" width="200" height="90" rx="10" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.6"/>
    <text x="416" y="728" text-anchor="middle" class="lbl stellar-text">Existing indexer</text>
    <text x="416" y="748" text-anchor="middle" class="lbl-xs">stellar.expert API</text>
    <text x="416" y="763" text-anchor="middle" class="lbl-xs">enumerate subentries</text>
  </g>
  <g>
    <rect x="532" y="700" width="200" height="90" rx="10" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.6"/>
    <text x="632" y="728" text-anchor="middle" class="lbl stellar-text">Soroswap Aggregator</text>
    <text x="632" y="748" text-anchor="middle" class="lbl-xs">route quotes</text>
    <text x="632" y="763" text-anchor="middle" class="lbl-xs">classic + Soroban</text>
  </g>
  <g>
    <rect x="748" y="700" width="200" height="90" rx="10" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.6"/>
    <text x="848" y="728" text-anchor="middle" class="lbl stellar-text">DeFi Position API</text>
    <text x="848" y="748" text-anchor="middle" class="lbl-xs">OctoPos / Orion</text>
    <text x="848" y="763" text-anchor="middle" class="lbl-xs">positions per address</text>
  </g>
  <g>
    <rect x="964" y="700" width="216" height="90" rx="10" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.8"/>
    <text x="1072" y="728" text-anchor="middle" class="lbl stellar-text">Stellar ledger</text>
    <text x="1072" y="748" text-anchor="middle" class="lbl-xs">classic + Soroban</text>
    <text x="1072" y="763" text-anchor="middle" class="lbl-xs">canonical state</text>
  </g>

  <!-- arrows from data services to ledger -->
  <line x1="200" y1="795" x2="1000" y2="838" stroke="#0891B2" stroke-width="1.2" opacity="0"/>
  <line x1="200" y1="795" x2="200" y2="845" stroke="#0891B2" stroke-width="1.2"/>
  <line x1="416" y1="795" x2="416" y2="845" stroke="#0891B2" stroke-width="1.2"/>
  <line x1="632" y1="795" x2="632" y2="845" stroke="#0891B2" stroke-width="1.2"/>
  <line x1="848" y1="795" x2="848" y2="845" stroke="#0891B2" stroke-width="1.2"/>
  <path d="M 200 845 L 1072 845 L 1072 795" fill="none" stroke="#0891B2" stroke-width="1.2"
        marker-end="url(#arr-stellar)"/>
  <text x="636" y="860" text-anchor="middle" class="lbl-xs stellar-text">all data services read canonical ledger state</text>

  <!-- ================== CROSS-LAYER ARROWS ================== -->
  <!-- UI → analysis (read-only request) -->
  <path d="M 210 235 L 210 388 L 200 388 L 200 444" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr-slate)"/>
  <text x="232" y="375" class="lbl-xs">read-only</text>

  <!-- analysis → indexer/RPC/defi -->
  <line x1="200" y1="578" x2="200" y2="698" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr-slate)"/>
  <line x1="416" y1="578" x2="416" y2="698" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr-slate)"/>
  <line x1="632" y1="578" x2="632" y2="698" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr-slate)"/>
  <line x1="848" y1="578" x2="848" y2="698" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr-slate)"/>

  <!-- analysis ↔ defi adapter -->
  <line x1="300" y1="510" x2="314" y2="510" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr-slate)"/>
  <!-- route ↔ -->
  <line x1="516" y1="510" x2="530" y2="510" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr-slate)"/>
  <!-- med ↔ -->
  <line x1="732" y1="510" x2="746" y2="510" stroke="#64748B" stroke-width="1.4" marker-end="url(#arr-slate)"/>

  <!-- HERO ARROW: Signer (browser) → Stellar RPC (data layer) directly, bypassing backend -->
  <path d="M 630 333 C 630 385, 200 385, 200 700"
        fill="none" stroke="#4F46E5" stroke-width="3" marker-end="url(#arr-indigo)"/>
  <rect x="350" y="378" width="240" height="22" rx="6" fill="#FFFFFF"/>
  <text x="470" y="394" text-anchor="middle" class="lbl-sm indigo-text" font-weight="700">signed XDR · bypasses backend</text>

  <!-- Note callout -->
  <g>
    <rect x="980" y="380" width="240" height="50" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
    <text x="1100" y="402" text-anchor="middle" class="lbl-sm" fill="#92400E" font-weight="700">Backend never sees a private key.</text>
    <text x="1100" y="418" text-anchor="middle" class="lbl-xs" fill="#92400E">It can be replaced or self-hosted.</text>
  </g>

  <!-- ================== LEGEND ================== -->
  <g transform="translate(64,895)">
    <rect x="0" y="-10" width="14" height="14" rx="3" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="22" y="1" class="lbl-xs">Browser client (trust boundary)</text>
    <rect x="220" y="-10" width="14" height="14" rx="3" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
    <text x="242" y="1" class="lbl-xs">Read-only backend</text>
    <rect x="400" y="-10" width="14" height="14" rx="3" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
    <text x="422" y="1" class="lbl-xs">Stellar network + data</text>
    <line x1="600" y1="-3" x2="640" y2="-3" stroke="#4F46E5" stroke-width="2.5" marker-end="url(#arr-indigo)"/>
    <text x="648" y="1" class="lbl-xs">user-signed transaction</text>
  </g>
</svg>
