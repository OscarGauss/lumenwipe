<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1020" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      .h-title { font: 700 22px Inter, system-ui, sans-serif; fill: #0F172A; }
      .h-sub   { font: 500 13px Inter, system-ui, sans-serif; fill: #64748B; }
      .lbl     { font: 600 14px Inter, system-ui, sans-serif; fill: #0F172A; }
      .lbl-sm  { font: 500 12px Inter, system-ui, sans-serif; fill: #475569; }
      .lbl-xs  { font: 500 11px Inter, system-ui, sans-serif; fill: #64748B; }
      .indigo-text { fill: #4338CA; }
      .stellar-text { fill: #0E7490; }
    </style>
    <marker id="arr-indigo" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4F46E5"/></marker>
    <marker id="arr-stellar" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0891B2"/></marker>
    <marker id="arr-slate" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/></marker>
  </defs>

  <rect width="1000" height="1020" fill="#FFFFFF"/>

  <text x="64" y="56" class="h-title">Signing flow — keys stay client-side</text>
  <text x="64" y="80" class="h-sub">Every transaction is reviewed and signed by the user. The secret key (when used) lives in memory only.</text>

  <!-- BROWSER TRUST BOUNDARY -->
  <rect x="60" y="100" width="880" height="640" rx="20" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2" stroke-dasharray="8 6" opacity="0.85"/>
  <text x="80" y="125" font-size="12" font-weight="700" fill="#4338CA" letter-spacing="0.08em">BROWSER · TRUST BOUNDARY · KEYS NEVER LEAVE</text>
  <g transform="translate(905,108)">
    <rect x="0" y="6" width="16" height="12" rx="2" fill="#4F46E5"/>
    <path d="M2.5 6 v-3 a5.5 5.5 0 0 1 11 0 v3" fill="none" stroke="#4F46E5" stroke-width="2"/>
  </g>

  <!-- STELLAR NETWORK zone -->
  <rect x="60" y="760" width="880" height="180" rx="20" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.8"/>
  <text x="80" y="785" font-size="12" font-weight="700" fill="#0E7490" letter-spacing="0.08em">STELLAR NETWORK · RPC</text>

  <!-- env -->
  <g>
    <rect x="350" y="150" width="300" height="60" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.6"/>
    <text x="500" y="180" text-anchor="middle" class="lbl indigo-text">Unsigned transaction envelope</text>
    <text x="500" y="198" text-anchor="middle" class="lbl-xs">built deterministically from the plan</text>
  </g>

  <!-- review -->
  <g>
    <rect x="350" y="240" width="300" height="60" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="2.2"/>
    <text x="500" y="270" text-anchor="middle" class="lbl indigo-text">XDR review (collapsible)</text>
    <text x="500" y="288" text-anchor="middle" class="lbl-xs">user sees the exact operations before signing</text>
  </g>

  <!-- choice (diamond) -->
  <g>
    <polygon points="500,330 620,375 500,420 380,375" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.8"/>
    <text x="500" y="372" text-anchor="middle" class="lbl indigo-text">Signing method?</text>
    <text x="500" y="392" text-anchor="middle" class="lbl-xs">user choice</text>
  </g>

  <!-- kit (left) -->
  <g>
    <rect x="80" y="455" width="320" height="80" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.6"/>
    <text x="240" y="481" text-anchor="middle" class="lbl indigo-text">stellar-wallets-kit (default)</text>
    <text x="240" y="503" text-anchor="middle" class="lbl-xs">signTransaction / signAuthEntry</text>
    <text x="240" y="519" text-anchor="middle" class="lbl-xs">Freighter · LOBSTR · Hana · xBull · Albedo</text>
  </g>

  <!-- key (right) -->
  <g>
    <rect x="600" y="455" width="320" height="80" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.6"/>
    <text x="760" y="481" text-anchor="middle" class="lbl indigo-text">Secret key (advanced)</text>
    <text x="760" y="503" text-anchor="middle" class="lbl-xs">held in memory only · never persisted</text>
    <text x="760" y="519" text-anchor="middle" class="lbl-xs">cleared on tab close</text>
  </g>

  <!-- signed (merge) -->
  <g>
    <rect x="350" y="570" width="300" height="60" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.6"/>
    <!-- check icon -->
    <circle cx="378" cy="600" r="12" fill="#10B981"/>
    <path d="M 372 600 l 4 4 l 8 -8" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"/>
    <text x="510" y="605" text-anchor="middle" class="lbl indigo-text">Signed XDR</text>
  </g>

  <!-- confirm -->
  <g>
    <rect x="320" y="660" width="360" height="60" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <text x="500" y="688" text-anchor="middle" class="lbl" fill="#92400E">Explicit irreversibility confirmation</text>
    <text x="500" y="706" text-anchor="middle" class="lbl-xs" fill="#92400E">user clicks through a final warning before submit</text>
  </g>

  <!-- send (in Stellar zone) -->
  <g>
    <rect x="200" y="810" width="240" height="70" rx="10" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.8"/>
    <text x="320" y="838" text-anchor="middle" class="lbl stellar-text">sendTransaction</text>
    <text x="320" y="858" text-anchor="middle" class="lbl-xs">Stellar RPC</text>
  </g>

  <!-- poll -->
  <g>
    <rect x="560" y="810" width="240" height="70" rx="10" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.8"/>
    <text x="680" y="838" text-anchor="middle" class="lbl stellar-text">Poll getTransaction</text>
    <text x="680" y="858" text-anchor="middle" class="lbl-xs">until confirmed or error</text>
  </g>

  <!-- next (back in browser) -->
  <g>
    <rect x="350" y="950" width="300" height="60" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.6"/>
    <text x="500" y="980" text-anchor="middle" class="lbl indigo-text">Mark step confirmed · advance</text>
    <text x="500" y="998" text-anchor="middle" class="lbl-xs">durable cursor saved · resume-safe</text>
  </g>

  <!-- ============ ARROWS ============ -->
  <line x1="500" y1="210" x2="500" y2="238" stroke="#4F46E5" stroke-width="1.8" marker-end="url(#arr-indigo)"/>
  <line x1="500" y1="300" x2="500" y2="328" stroke="#4F46E5" stroke-width="1.8" marker-end="url(#arr-indigo)"/>
  <!-- choice → kit -->
  <path d="M 410 396 C 360 416, 280 430, 240 453" fill="none" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#arr-indigo)"/>
  <text x="260" y="425" class="lbl-xs indigo-text">wallet</text>
  <!-- choice → key -->
  <path d="M 590 396 C 640 416, 720 430, 760 453" fill="none" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#arr-indigo)"/>
  <text x="700" y="425" class="lbl-xs indigo-text">advanced</text>
  <!-- kit → signed -->
  <path d="M 240 535 C 240 555, 380 570, 400 570" fill="none" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#arr-indigo)"/>
  <!-- key → signed -->
  <path d="M 760 535 C 760 555, 620 570, 600 570" fill="none" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#arr-indigo)"/>
  <!-- signed → confirm -->
  <line x1="500" y1="630" x2="500" y2="658" stroke="#4F46E5" stroke-width="1.8" marker-end="url(#arr-indigo)"/>
  <!-- confirm → send (down, crosses trust boundary) -->
  <path d="M 420 720 C 420 770, 320 780, 320 808" fill="none" stroke="#4F46E5" stroke-width="2.2" marker-end="url(#arr-stellar)"/>
  <text x="320" y="755" text-anchor="middle" class="lbl-xs indigo-text" font-weight="700">signed XDR ↓</text>
  <!-- send → poll -->
  <line x1="442" y1="845" x2="558" y2="845" stroke="#0891B2" stroke-width="1.8" marker-end="url(#arr-stellar)"/>
  <!-- poll → next (up, back in browser zone) -->
  <path d="M 680 810 C 680 770, 600 745, 600 745" fill="none" stroke="#0891B2" stroke-width="1.4" opacity="0"/>
  <path d="M 680 880 C 680 920, 540 935, 500 948" fill="none" stroke="#0891B2" stroke-width="1.8" marker-end="url(#arr-slate)"/>
  <text x="700" y="918" class="lbl-xs stellar-text">confirmation</text>

  <!-- "if failed retry" hint -->
  <path d="M 800 845 C 880 845, 880 700, 760 700" fill="none" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arr-slate)"/>
  <text x="820" y="770" class="lbl-xs" fill="#DC2626">on error</text>
  <text x="820" y="784" class="lbl-xs" fill="#DC2626">retry</text>
</svg>
